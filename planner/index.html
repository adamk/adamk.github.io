<script id="foxchase-interior-header-script">
  document.addEventListener("DOMContentLoaded", function () {
    document.querySelectorAll(".foxchase-site-header").forEach(function (header) {
      const toggle = header.querySelector(".foxchase-menu-toggle");
      const navigation = header.querySelector(".foxchase-navigation");

      if (!toggle || !navigation) return;

      toggle.addEventListener("click", function () {
        const open = navigation.classList.toggle("is-open");
        toggle.setAttribute("aria-expanded", String(open));
      });

      navigation.querySelectorAll("a").forEach(function (link) {
        link.addEventListener("click", function () {
          navigation.classList.remove("is-open");
          toggle.setAttribute("aria-expanded", "false");
        });
      });
    });
  });
</script>
